pre-commit:
  parallel: true
  commands:
    format:
      run: uv run ruff format --check .
    lint:
      run: uv run ruff check .
    release-metadata-sync:
      run: uv run pytest -q tests/test_release_metadata.py

pre-push:
  parallel: true
  commands:
    typecheck:
      run: uvx ty check
    test:
      run: uv run pytest -q
